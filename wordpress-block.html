<!-- Forbes Australia — NSW Fuel Price Map
     Paste into a Gutenberg Custom HTML block.
     Data updates automatically every 6 hours via GitHub Actions. -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<div id="fa-map-root">
<style>
  #fa-map-root {
    --red:    #cc0000;
    --green:  #16a34a;
    --amber:  #d97706;
    --cheap:  #16a34a;
    --mid:    #d97706;
    --pricey: #cc0000;
    font-family: inherit;
    color: #111;
  }
  #fa-map-root * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Header */
  .fa-hdr {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    border-bottom: 3px solid #111; padding-bottom: 12px; margin-bottom: 16px;
  }
  .fa-hdr-left { display: flex; align-items: center; gap: 10px; }
  .fa-live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    animation: fa-blink 1.4s ease-in-out infinite;
  }
  @keyframes fa-blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.25; transform:scale(.8); }
  }
  .fa-live-txt {
    font-size: 11px; font-weight: 800; letter-spacing: .12em;
    text-transform: uppercase; color: var(--red);
  }
  .fa-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
  .fa-updated { font-size: 11px; color: #888; }

  /* Fuel type tabs */
  .fa-tabs {
    display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .fa-tab {
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    border: 1.5px solid #ddd; border-radius: 20px;
    background: #fff; color: #555; cursor: pointer;
    transition: all .15s;
  }
  .fa-tab:hover { border-color: #999; color: #111; }
  .fa-tab.active {
    background: #111; border-color: #111; color: #fff;
  }

  /* Search */
  .fa-search {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .fa-search input {
    flex: 1; padding: 9px 14px; font-size: 14px; font-family: inherit;
    border: 1.5px solid #ddd; border-radius: 6px; outline: none;
    transition: border-color .15s;
  }
  .fa-search input:focus { border-color: #111; }
  .fa-search button {
    padding: 9px 18px; font-size: 13px; font-weight: 700;
    font-family: inherit; background: #111; color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: background .15s;
  }
  .fa-search button:hover { background: #333; }

  /* Map */
  #fa-map {
    width: 100%; height: 480px; border-radius: 8px;
    border: 1px solid #e5e5e5; margin-bottom: 16px;
    background: #f5f5f5;
  }

  /* Coverage note */
  .fa-coverage {
    font-size: 11px; color: #888; text-align: center;
    margin-bottom: 16px;
  }

  /* Results */
  .fa-results { margin-bottom: 16px; }
  .fa-results-hdr {
    font-size: 12px; font-weight: 800; letter-spacing: .07em;
    text-transform: uppercase; color: #555;
    border-bottom: 2px solid #111; padding-bottom: 6px; margin-bottom: 0;
  }
  .fa-station {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid #eee;
  }
  .fa-rank {
    font-size: 13px; font-weight: 800; color: #bbb; text-align: center;
  }
  .fa-station-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .fa-station-sub  { font-size: 12px; color: #666; }
  .fa-station-dist { font-size: 11px; color: #999; margin-top: 1px; }
  .fa-price {
    font-size: 18px; font-weight: 800; letter-spacing: -.02em; text-align: right;
  }
  .fa-price-sub { font-size: 11px; color: #888; text-align: right; }
  .price-cheap  { color: var(--cheap); }
  .price-mid    { color: var(--mid); }
  .price-pricey { color: var(--pricey); }

  /* Loading / error */
  .fa-loading {
    text-align: center; padding: 40px; color: #999; font-size: 14px;
  }
  .fa-error {
    text-align: center; padding: 20px; color: var(--red);
    font-size: 13px; background: #fff5f5; border-radius: 6px;
  }

  /* Footer */
  .fa-footer {
    font-size: 11px; color: #aaa; border-top: 1px solid #eee;
    padding-top: 10px; line-height: 1.7;
  }
  .fa-footer a { color: #aaa; }

  /* Leaflet popup override */
  .fa-popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .fa-popup-addr { font-size: 11px; color: #777; margin-bottom: 8px; }
  .fa-popup-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; }
  .fa-popup-row { font-size: 12px; }
  .fa-popup-ft  { color: #888; }
  .fa-popup-val { font-weight: 700; }
</style>

  <!-- Header -->
  <div class="fa-hdr">
    <div class="fa-hdr-left">
      <span class="fa-live-dot"></span>
      <span class="fa-live-txt">Live</span>
      <span class="fa-title">Fuel Price Check</span>
    </div>
    <span class="fa-updated" id="fa-updated">Loading...</span>
  </div>

  <!-- Fuel type tabs -->
  <div class="fa-tabs" id="fa-tabs">
    <button class="fa-tab active" data-ft="U91">Unleaded 91</button>
    <button class="fa-tab" data-ft="E10">E10</button>
    <button class="fa-tab" data-ft="DL">Diesel</button>
    <button class="fa-tab" data-ft="U95">Premium 95</button>
    <button class="fa-tab" data-ft="U98">Premium 98</button>
  </div>

  <!-- Search -->
  <div class="fa-search">
    <input type="text" id="fa-input" placeholder="Enter suburb or postcode in NSW…" />
    <button onclick="faSearch()">Find cheapest</button>
  </div>

  <!-- Map -->
  <div id="fa-map"></div>
  <p class="fa-coverage">📍 Currently showing NSW. Station prices update every 6 hours.</p>

  <!-- Results list -->
  <div class="fa-results" id="fa-results" style="display:none">
    <p class="fa-results-hdr" id="fa-results-hdr"></p>
    <div id="fa-results-list"></div>
  </div>

  <!-- Footer -->
  <p class="fa-footer">
    Sources: <a href="https://api.nsw.gov.au/Product/Index/22" target="_blank" rel="noopener">FuelCheck NSW API</a> (real-time, 2,500+ stations) ·
    <a href="https://www.accc.gov.au/about-us/publications/weekly-fuel-price-monitoring-update" target="_blank" rel="noopener">ACCC Fuel Monitoring</a>.
    Map data © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors.
  </p>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function () {

  var DATA_URL = 'https://raw.githubusercontent.com/SamHuss91/Fuel-Tracker/main/data/stations-nsw.json';

  var state = {
    stations:  [],
    fuelType:  'U91',
    map:       null,
    cluster:   null,
    markerMap: {},   // code → marker
    p25: 0, p75: 0,  // price percentiles for colour coding
  };

  // ── Haversine distance (km) ───────────────────────────────────────────────
  function dist(lat1, lng1, lat2, lng2) {
    var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2)
          + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
          * Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── Price colour ─────────────────────────────────────────────────────────
  function priceColor(p) {
    if (p <= state.p25) return '#16a34a';
    if (p >= state.p75) return '#cc0000';
    return '#d97706';
  }
  function priceClass(p) {
    if (p <= state.p25) return 'price-cheap';
    if (p >= state.p75) return 'price-pricey';
    return 'price-mid';
  }

  // ── Format price ─────────────────────────────────────────────────────────
  function fmt(v) { return v != null ? '$' + v.toFixed(2) : '—'; }

  // ── Build popup HTML ─────────────────────────────────────────────────────
  function popupHtml(s) {
    var ftOrder = ['U91','E10','U95','U98','DL','PDL'];
    var labels  = {'U91':'ULP 91','E10':'E10','U95':'Prem 95','U98':'Prem 98','DL':'Diesel','PDL':'Prem Diesel'};
    var rows = ftOrder
      .filter(function(ft) { return s.prices[ft] != null; })
      .map(function(ft) {
        return '<div class="fa-popup-row"><span class="fa-popup-ft">' + labels[ft] + '</span> '
          + '<span class="fa-popup-val">' + fmt(s.prices[ft]) + '</span></div>';
      }).join('');
    return '<div class="fa-popup-name">' + s.name + '</div>'
      + '<div class="fa-popup-addr">' + s.address + ', ' + s.suburb + ' ' + s.postcode + '</div>'
      + '<div class="fa-popup-prices">' + rows + '</div>';
  }

  // ── Calculate percentiles ────────────────────────────────────────────────
  function calcPercentiles() {
    var vals = state.stations
      .map(function(s) { return s.prices[state.fuelType]; })
      .filter(function(v) { return v != null; })
      .sort(function(a,b) { return a-b; });
    state.p25 = vals[Math.floor(vals.length * 0.25)] || 0;
    state.p75 = vals[Math.floor(vals.length * 0.75)] || 0;
  }

  // ── Render markers ────────────────────────────────────────────────────────
  function renderMarkers() {
    state.cluster.clearLayers();
    state.markerMap = {};
    calcPercentiles();

    state.stations.forEach(function(s) {
      var price = s.prices[state.fuelType];
      if (price == null || !s.lat || !s.lng) return;

      var color  = priceColor(price);
      var marker = L.circleMarker([s.lat, s.lng], {
        radius:      7,
        fillColor:   color,
        color:       '#fff',
        weight:      1.5,
        fillOpacity: 0.85,
      }).bindPopup(popupHtml(s), { maxWidth: 220 });

      state.cluster.addLayer(marker);
      state.markerMap[s.code] = marker;
    });

    state.map.addLayer(state.cluster);
  }

  // ── Search ────────────────────────────────────────────────────────────────
  window.faSearch = function () {
    var query = document.getElementById('fa-input').value.trim();
    if (!query) return;

    var btn = document.querySelector('#fa-map-root .fa-search button');
    btn.textContent = 'Searching…';
    btn.disabled = true;

    var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=au&q='
      + encodeURIComponent(query + ' NSW');

    fetch(url, { headers: { 'Accept-Language': 'en' } })
      .then(function(r) { return r.json(); })
      .then(function(results) {
        btn.textContent = 'Find cheapest';
        btn.disabled = false;

        if (!results || !results.length) {
          alert('Suburb or postcode not found in NSW. Try a different spelling.');
          return;
        }

        var lat = parseFloat(results[0].lat);
        var lng = parseFloat(results[0].lon);
        var label = results[0].display_name.split(',')[0];

        state.map.setView([lat, lng], 13);
        showResults(lat, lng, label);
      })
      .catch(function() {
        btn.textContent = 'Find cheapest';
        btn.disabled = false;
        alert('Search failed. Please try again.');
      });
  };

  // ── Show nearest results list ─────────────────────────────────────────────
  function showResults(lat, lng, label) {
    var ft = state.fuelType;
    var nearby = state.stations
      .filter(function(s) { return s.prices[ft] != null && s.lat && s.lng; })
      .map(function(s) { return Object.assign({}, s, { _dist: dist(lat, lng, s.lat, s.lng) }); })
      .filter(function(s) { return s._dist <= 20; })
      .sort(function(a, b) { return a.prices[ft] - b.prices[ft]; })
      .slice(0, 10);

    var ftLabels = {'U91':'Unleaded 91','E10':'E10','U95':'Premium 95','U98':'Premium 98','DL':'Diesel','PDL':'Premium Diesel'};

    document.getElementById('fa-results-hdr').textContent =
      'Cheapest ' + (ftLabels[ft] || ft) + ' near ' + label;

    var html = nearby.map(function(s, i) {
      var price = s.prices[ft];
      var cls   = priceClass(price);
      return '<div class="fa-station">'
        + '<div class="fa-rank">' + (i+1) + '</div>'
        + '<div>'
          + '<div class="fa-station-name">' + s.name + '</div>'
          + '<div class="fa-station-sub">' + s.address + ', ' + s.suburb + '</div>'
          + '<div class="fa-station-dist">' + s._dist.toFixed(1) + ' km away</div>'
        + '</div>'
        + '<div>'
          + '<div class="fa-price ' + cls + '">' + fmt(price) + '</div>'
          + '<div class="fa-price-sub">per litre</div>'
        + '</div>'
        + '</div>';
    }).join('');

    if (!nearby.length) {
      html = '<p style="padding:16px;color:#888;font-size:13px;">No stations with '
        + (ftLabels[ft] || ft) + ' prices found within 20km.</p>';
    }

    document.getElementById('fa-results-list').innerHTML = html;
    document.getElementById('fa-results').style.display = 'block';

    // Scroll results into view
    document.getElementById('fa-results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Fuel type tabs ────────────────────────────────────────────────────────
  document.getElementById('fa-tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.fa-tab');
    if (!tab) return;
    document.querySelectorAll('#fa-map-root .fa-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    state.fuelType = tab.dataset.ft;
    renderMarkers();

    // Re-run search if results are showing
    var input = document.getElementById('fa-input').value.trim();
    if (input && document.getElementById('fa-results').style.display !== 'none') {
      window.faSearch();
    }
  });

  // ── Enter key on search input ─────────────────────────────────────────────
  document.getElementById('fa-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.faSearch();
  });

  // ── Init map ──────────────────────────────────────────────────────────────
  function initMap() {
    state.map = L.map('fa-map', { zoomControl: true }).setView([-32.5, 147.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(state.map);
    state.cluster = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 40 });
  }

  // ── Timestamp ─────────────────────────────────────────────────────────────
  function setTimestamp(iso) {
    try {
      var d = new Date(iso);
      document.getElementById('fa-updated').textContent =
        'Last updated: ' +
        d.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit', timeZone:'Australia/Sydney' }) +
        ' AEST, ' +
        d.toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric', timeZone:'Australia/Sydney' });
    } catch(e) {}
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  initMap();
  document.getElementById('fa-updated').textContent = 'Loading station data…';

  fetch(DATA_URL + '?_=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      state.stations = data.stations || [];
      setTimestamp(data.updated_at);
      renderMarkers();
    })
    .catch(function(err) {
      console.error('Fuel tracker load error:', err);
      document.getElementById('fa-updated').textContent = 'Could not load data — try refreshing';
      document.getElementById('fa-map').innerHTML =
        '<div class="fa-error">Station data could not be loaded. Please refresh the page.</div>';
    });

})();
</script>
